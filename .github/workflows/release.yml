name: Release

# Fires when bin/cut-release pushes a version tag: builds the (unsigned) DMG on
# a macOS runner and publishes a GitHub Release with checksums + notes from the
# CHANGELOG section (commit-list fallback via scripts/release/notes.ts).
on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # tags + history for the notes fallback
          submodules: true # project-template sha is baked into the build stamp

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13 # pinned for reproducible CI (matches local toolchain)

      - name: Verify tag matches package.json
        run: |
          PKG="$(bun -e 'console.log(JSON.parse(await Bun.file("package.json").text()).version)')"
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG" != "$TAG" ]; then
            echo "tag $GITHUB_REF_NAME does not match package.json version $PKG" >&2
            exit 1
          fi

      # Full install: packaging needs the electron-rebuild postinstall for the
      # native modules (node-pty, better-sqlite3).
      - name: Install
        run: bun install --frozen-lockfile

      - name: Test
        run: bun run test

      - name: Build DMG
        run: bun run dist

      - name: Checksums
        run: cd dist && shasum -a 256 *.dmg > SHA256SUMS.txt && cat SHA256SUMS.txt

      - name: Release notes
        run: bun scripts/release/notes.ts "$GITHUB_REF_NAME" > release-notes.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: TerMinal ${{ github.ref_name }}
          body_path: release-notes.md
          files: |
            dist/*.dmg
            dist/SHA256SUMS.txt
