name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# A newer push to the same branch/PR supersedes the running check.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13 # pinned for reproducible CI (matches local toolchain)

      # --ignore-scripts skips node-pty's electron-rebuild (native build not
      # needed for typecheck/test/bundle, and avoids CI flakiness).
      - name: Install
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Format
        run: bun run format:check

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

  # High/Critical advisories in the dependency tree are blocking (CLAUDE.md §10).
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Audit
        run: bun audit --audit-level=high

  # Flags vulnerable or newly-risky dependencies introduced by a PR's diff.
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
