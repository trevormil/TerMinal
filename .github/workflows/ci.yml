name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13 # pinned for reproducible CI (matches local toolchain)

      # --ignore-scripts skips node-pty's electron-rebuild (native build not
      # needed for typecheck/test/bundle, and avoids CI flakiness).
      - name: Install
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build
