  # eval:
  #   runs-on: ubuntu-latest
  #   needs: quality
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: oven-sh/setup-bun@v2
  #       with:
  #         bun-version: latest
  #     - run: bun install --frozen-lockfile
  #     - name: Deterministic eval gate
  #       run: bun run eval        # must exit non-zero on any failing case
