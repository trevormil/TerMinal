name: TerMinalRemote
options:
  bundleIdPrefix: ${BUNDLE_ID_PREFIX}
  deploymentTarget:
    iOS: '17.0'
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: '1.0'
    CURRENT_PROJECT_VERSION: '29'
    SWIFT_VERSION: '5.9'
    # Apple Developer team id. Also read by scripts/testflight.sh, which
    # generates ExportOptions.plist from it — keep this the only copy.
    DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM}
    CODE_SIGN_STYLE: Automatic
targets:
  TerMinalRemote:
    type: application
    platform: iOS
    deploymentTarget: '17.0'
    sources:
      - path: TerMinalRemote
    info:
      path: TerMinalRemote/Info.plist
      properties:
        CFBundleDisplayName: TerMinal
        CFBundleShortVersionString: '$(MARKETING_VERSION)'
        CFBundleVersion: '$(CURRENT_PROJECT_VERSION)'
        LSApplicationCategoryType: public.app-category.developer-tools
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen:
          UIColorName: ''
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        # IBM Plex, the same pairing the desktop renderer uses. Vendored under
        # the OFL (see Fonts/LICENSE.txt) because node_modules ships woff only,
        # which iOS cannot load.
        UIAppFonts:
          - IBMPlexSans-Regular.ttf
          - IBMPlexSans-Medium.ttf
          - IBMPlexSans-SemiBold.ttf
          - IBMPlexMono-Regular.ttf
          - IBMPlexMono-Medium.ttf
        # The bridge is a self-signed HTTPS server on a private address. The
        # client pins its certificate fingerprint (see PinnedTrust.swift), which
        # is strictly stronger than chain validation against a public CA — but
        # ATS still needs local networking allowed to reach a bare IP.
        NSAppTransportSecurity:
          # The bridge is always self-signed and reached by bare IP — a LAN
          # 192.168/10.x address OR the tailnet's 100.64/10 CGNAT, which ATS
          # does NOT count as "local networking". Security comes from cert
          # pinning in the app, not ATS.
          #
          # ONLY NSAllowsArbitraryLoads, deliberately: on iOS 10+ the presence
          # of NSAllowsLocalNetworking makes iOS IGNORE NSAllowsArbitraryLoads
          # (treats it as false). That combination exempted LAN but left the
          # tailnet CGNAT under ATS, which blocked the self-signed cert and
          # failed the handshake with -1200. Arbitrary-loads alone disables ATS
          # for every address, LAN and tailnet both.
          NSAllowsArbitraryLoads: true
        NSLocalNetworkUsageDescription: >-
          TerMinal connects to the Mac running TerMinal on your local network to
          mirror your terminal sessions.
        NSCameraUsageDescription: >-
          TerMinal uses the camera only to scan the pairing QR code shown in
          TerMinal's Settings on your Mac.
        NSPhotoLibraryUsageDescription: >-
          TerMinal lets you send a screenshot or photo to an agent session.
        NSFaceIDUsageDescription: >-
          TerMinal can use Face ID to unlock the app's passcode lock.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ${PRODUCT_BUNDLE_ID}
        GENERATE_INFOPLIST_FILE: NO
        # iPhone only. Shipping iPad would need a separate screenshot set and a
        # layout pass; add it back deliberately, not by default.
        TARGETED_DEVICE_FAMILY: '1'
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: TerMinalRemote/TerMinalRemote.entitlements
        ENABLE_USER_SCRIPT_SANDBOXING: YES
  # Live pairing test. Drives the app against ios/scripts/e2e-bridge.ts, so it
  # needs that harness running — deliberately NOT in the TerMinalRemote scheme's
  # test action. Run it with scripts/e2e-app.sh.
  TerMinalRemoteUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: '17.0'
    sources:
      - path: TerMinalRemoteUITests
    dependencies:
      - target: TerMinalRemote
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ${PRODUCT_BUNDLE_ID}.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: TerMinalRemote
  TerMinalRemoteTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: '17.0'
    sources:
      - path: TerMinalRemoteTests
    dependencies:
      - target: TerMinalRemote
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ${PRODUCT_BUNDLE_ID}.tests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  TerMinalRemote:
    build:
      targets:
        TerMinalRemote: all
        TerMinalRemoteTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - TerMinalRemoteTests
    archive:
      config: Release
  TerMinalRemoteLive:
    build:
      targets:
        TerMinalRemote: all
        TerMinalRemoteUITests: [test]
    test:
      config: Debug
      targets:
        - TerMinalRemoteUITests
