name: TerMinalRemote
options:
  bundleIdPrefix: com.trevormil
  deploymentTarget:
    iOS: '17.0'
  createIntermediateGroups: true
packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    exactVersion: 1.15.0
settings:
  base:
    MARKETING_VERSION: '1.0'
    CURRENT_PROJECT_VERSION: "5"
    SWIFT_VERSION: '5.9'
    # Apple Developer team id. Also read by scripts/testflight.sh, which
    # generates ExportOptions.plist from it — keep this the only copy.
    DEVELOPMENT_TEAM: '8UWQ486J94'
    CODE_SIGN_STYLE: Automatic
targets:
  TerMinalRemote:
    type: application
    platform: iOS
    deploymentTarget: '17.0'
    sources:
      - path: TerMinalRemote
    dependencies:
      - package: SwiftTerm
    info:
      path: TerMinalRemote/Info.plist
      properties:
        CFBundleDisplayName: TerMinal
        CFBundleShortVersionString: '$(MARKETING_VERSION)'
        CFBundleVersion: '$(CURRENT_PROJECT_VERSION)'
        LSApplicationCategoryType: public.app-category.developer-tools
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen:
          UIColorName: ''
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        # The bridge is a self-signed HTTPS server on a private address. The
        # client pins its certificate fingerprint (see PinnedTrust.swift), which
        # is strictly stronger than chain validation against a public CA — but
        # ATS still needs local networking allowed to reach a bare IP.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSLocalNetworkUsageDescription: >-
          TerMinal connects to the Mac running TerMinal on your local network to
          mirror your terminal sessions.
        NSCameraUsageDescription: >-
          TerMinal uses the camera only to scan the pairing QR code shown in
          TerMinal's Settings on your Mac.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.trevormil.terminal
        GENERATE_INFOPLIST_FILE: NO
        # iPhone only. Shipping iPad would need a separate screenshot set and a
        # layout pass; add it back deliberately, not by default.
        TARGETED_DEVICE_FAMILY: '1'
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: TerMinalRemote/TerMinalRemote.entitlements
        ENABLE_USER_SCRIPT_SANDBOXING: YES
  # Live pairing test. Drives the app against ios/scripts/e2e-bridge.ts, so it
  # needs that harness running — deliberately NOT in the TerMinalRemote scheme's
  # test action. Run it with scripts/e2e-app.sh.
  TerMinalRemoteUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: '17.0'
    sources:
      - path: TerMinalRemoteUITests
    dependencies:
      - target: TerMinalRemote
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.trevormil.terminal.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: TerMinalRemote
  TerMinalRemoteTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: '17.0'
    sources:
      - path: TerMinalRemoteTests
    dependencies:
      - target: TerMinalRemote
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.trevormil.terminal.tests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  TerMinalRemote:
    build:
      targets:
        TerMinalRemote: all
        TerMinalRemoteTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - TerMinalRemoteTests
    archive:
      config: Release
  TerMinalRemoteLive:
    build:
      targets:
        TerMinalRemote: all
        TerMinalRemoteUITests: [test]
    test:
      config: Debug
      targets:
        - TerMinalRemoteUITests
